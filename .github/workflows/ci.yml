name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  docker:
    name: Docker smoke test
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: |
          docker build \
            --tag ai-prompt-attack-detector:ci \
            .

      - name: Start container
        run: |
          docker run \
            --detach \
            --name prompt-attack-detector-ci \
            --publish 127.0.0.1:8501:8501 \
            ai-prompt-attack-detector:ci

      - name: Wait for application health endpoint
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent \
              http://127.0.0.1:8501/_stcore/health; then
              echo
              echo "Application is healthy."
              exit 0
            fi

            echo "Waiting for application: attempt ${attempt}/30"
            sleep 2
          done

          echo "Application did not become healthy."
          docker logs prompt-attack-detector-ci
          exit 1

      - name: Show container status
        run: docker ps --all

      - name: Remove test container
        if: always()
        run: |
          docker rm \
            --force \
            prompt-attack-detector-ci \
            2>/dev/null || true